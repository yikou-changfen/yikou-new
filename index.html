<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一口腸粉｜台中一中街｜港式復古餐車</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0f1816; --gold:#efc166; --red:#c53030; --text:#f5f0e8; }
    body { margin:0; font-family:'Noto Serif TC',serif; background:var(--bg); color:var(--text); text-align:center; padding-bottom:50px; }
    .hero { padding:60px 20px; }
    h1 { font-size:2.5rem; margin-bottom:10px; color:var(--gold); }
    .tagline { color:var(--red); font-weight:bold; border:1px solid var(--red); padding:5px 15px; border-radius:50px; display:inline-block; margin-bottom:20px; }
    .btn-group { display:flex; flex-direction:column; gap:15px; max-width:300px; margin:30px auto; }
    .btn { padding:15px; border-radius:10px; text-decoration:none; font-weight:bold; font-family:'Noto Sans TC',sans-serif; }
    .btn-uber { background:#06C167; color:white; }
    .btn-maps { background:var(--red); color:white; }
    .menu { max-width:800px; margin:0 auto; padding:20px; }
    .card { background:rgba(255,255,255,0.05); border:1px solid var(--gold); border-radius:10px; padding:20px; margin-bottom:20px; }
    .footer { opacity:0.6; font-size:0.8rem; margin-top:40px; }
  </style>
</head>
<body>
  <div class="hero">
    <span class="tagline">比你前任更黏的腸粉</span>
    <h1>一口腸粉</h1>
    <p>台中一中街｜現做蒸氣｜復古港味</p>
    <div class="btn-group">
      <a href="https://www.ubereats.com/tw" class="btn btn-uber">🛵 Uber Eats 點餐</a>
      <a href="https://goo.gl/maps/PLACEHOLDER" class="btn btn-maps">📍 導航去現場</a>
    </div>
  </div>
  <div class="menu">
    <h2 style="color:var(--gold)">🔥 必吃英雄榜</h2>
    <div class="card"><h3>經典肉蛋腸粉</h3><p>溫體豬 x 滑嫩蛋，回購第一名。</p></div>
    <div class="card"><h3>海陸全餐腸粉</h3><p>現剝大蝦 + 肉絲，豪華必點。</p></div>
    <div class="card"><h3>每日鮮蚵腸粉</h3><p>產地直送鮮蚵，限量供應。</p></div>
  </div>
  <div class="footer">© 2025 一口腸粉</div>
</body>
</html>
